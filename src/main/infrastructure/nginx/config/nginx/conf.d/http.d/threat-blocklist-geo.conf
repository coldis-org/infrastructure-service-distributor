# Sets $threat_blocked = 1 for IPs/CIDRs listed in conf.d/include.d/threat-blocklist-ips.conf
# (populated at runtime by nginx_update_threat_blocklist), 0 for everything else.
# The actual block lives in conf.d/include.d/threat-blocklist.conf, included by
# each server{} — if/return is not valid in http{}.
geo $threat_blocked {
    default 0;
    include /etc/nginx/conf.d/include.d/threat-blocklist-ips.conf;
}
