# VTS metrics endpoint (Prometheus).
# Dedicated internal server on its own port, not a vhost (no server_name/cert/oauth).
# The vhost_traffic_status_zone is already enabled globally in nginx.conf, so this
# only exposes the already-collected metrics for scraping.
server {

    listen ${VTS_STATUS_PORT};

    # Scrape endpoint: no request logging and no modsecurity overhead.
    access_log off;
    modsecurity off;

    location /status {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format prometheus;
    }

    location / {
        return 404;
    }
}
